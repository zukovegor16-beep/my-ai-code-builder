# =============================================================================
# Template: deployment-api.yaml
# =============================================================================
# File: infra/helm-charts/crawler-core/templates/deployment-api.yaml
{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: {{ .Release.Name }}-api
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
        component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ .Release.Name }}-crawler
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
      - name: api
        image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.api.service.targetPort }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.api.env.NODE_ENV | quote }}
        - name: DB_HOST
          value: {{ .Values.api.env.DB_HOST | quote }}
        - name: DB_PORT
          value: {{ .Values.api.env.DB_PORT | quote }}
        - name: DB_USER
          value: {{ .Values.api.env.DB_USER | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crawler-db-credentials
              key: password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: crawler-redis-credentials
              key: url
        - name: STREAM_NAME
          value: {{ .Values.api.env.STREAM_NAME | quote }}
        - name: GROUP_NAME
          value: {{ .Values.api.env.GROUP_NAME | quote }}
        {{- if .Values.api.env.VAULT_ADDR }}
        - name: VAULT_ADDR
          value: {{ .Values.api.env.VAULT_ADDR | quote }}
        {{- end }}
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.api.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.api.readinessProbe | nindent 10 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}