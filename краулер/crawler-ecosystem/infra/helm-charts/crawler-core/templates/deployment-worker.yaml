# =============================================================================
# Template: deployment-worker.yaml
# =============================================================================
# File: infra/helm-charts/crawler-core/templates/deployment-worker.yaml
{{- if .Values.worker.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app: {{ .Release.Name }}-worker
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-worker
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-worker
        component: worker
    spec:
      serviceAccountName: {{ .Release.Name }}-crawler
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
      - name: worker
        image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag }}"
        imagePullPolicy: {{ .Values.global.image.pullPolicy }}
        env:
        - name: NODE_ENV
          value: {{ .Values.worker.env.NODE_ENV | quote }}
        - name: DB_HOST
          value: {{ .Values.worker.env.DB_HOST | quote }}
        - name: DB_PORT
          value: {{ .Values.worker.env.DB_PORT | quote }}
        - name: DB_USER
          value: {{ .Values.worker.env.DB_USER | quote }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: crawler-db-credentials
              key: password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: crawler-redis-credentials
              key: url
        - name: STREAM_NAME
          value: {{ .Values.worker.env.STREAM_NAME | quote }}
        - name: GROUP_NAME
          value: {{ .Values.worker.env.GROUP_NAME | quote }}
        - name: WORKER_NAME
          value: {{ .Values.worker.env.WORKER_NAME | quote }}
        resources:
          {{- toYaml .Values.worker.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.worker.livenessProbe | nindent 10 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}