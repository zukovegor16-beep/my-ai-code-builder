# =============================================================================
# File: infra/istio/virtualservice.yaml
# Routes traffic from the Gateway to the appropriate services.
# =============================================================================

# ---------------------------------------------------------------------------
# VirtualService for the API
# ---------------------------------------------------------------------------
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: api-vs
  namespace: crawler
spec:
  hosts:
    - "api.crawler-ecosystem.com"
  gateways:
    - crawler-gateway
  http:
    # -----------------------------------------------
    # REST API routes
    # -----------------------------------------------
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: crawler-api
            port:
              number: 3000
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: "5xx,connect-failure,refused-stream,gateway-error"
      timeout: 15s
      corsPolicy:
        allowOrigins:
          - exact: "https://crawler-ecosystem.com"
        allowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        allowHeaders:
          - Authorization
          - Content-Type
        maxAge: "24h"
    # -----------------------------------------------
    # WebSocket upgrade for live logs
    # -----------------------------------------------
    - match:
        - uri:
            prefix: /ws
      route:
        - destination:
            host: crawler-api
            port:
              number: 3000
      websocketUpgrade: true
      timeout: 3600s
    # -----------------------------------------------
    # Fallback: return 404 for unknown paths
    # -----------------------------------------------
    - route:
        - destination:
            host: crawler-api
            port:
              number: 3000
      fault:
        abort:
          percentage:
            value: 100
          httpStatus: 404

# ---------------------------------------------------------------------------
# VirtualService for Monitoring services (Grafana, Prometheus, Loki, Tempo)
# ---------------------------------------------------------------------------
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: monitoring-vs
  namespace: monitoring
spec:
  hosts:
    - "grafana.monitoring.crawler-ecosystem.com"
    - "prometheus.monitoring.crawler-ecosystem.com"
    - "loki.monitoring.crawler-ecosystem.com"
    - "tempo.monitoring.crawler-ecosystem.com"
  gateways:
    - crawler-gateway
  http:
    - match:
        - uri:
            prefix: /
          headers:
            host:
              prefix: "grafana"
      route:
        - destination:
            host: grafana
            port:
              number: 3000
    - match:
        - uri:
            prefix: /
          headers:
            host:
              prefix: "prometheus"
      route:
        - destination:
            host: prometheus
            port:
              number: 9090
    - match:
        - uri:
            prefix: /
          headers:
            host:
              prefix: "loki"
      route:
        - destination:
            host: loki
            port:
              number: 3100
    - match:
        - uri:
            prefix: /
          headers:
            host:
              prefix: "tempo"
      route:
        - destination:
            host: tempo
            port:
              number: 3200