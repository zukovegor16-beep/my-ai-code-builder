# =============================================================================
# File: infra/vault/vault-secret-store.yaml
# SecretProviderClass for CSI driver – injects secrets into pods.
# =============================================================================

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: crawler-vault-secrets
  namespace: crawler
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.crawler-ecosystem.com:8200"
    roleName: "crawler-admin"
    objects: |
      - objectName: "db-password"
        secretPath: "secret/data/crawler/database"
        secretKey: "password"
      - objectName: "redis-password"
        secretPath: "secret/data/crawler/redis"
        secretKey: "password"
      - objectName: "anti-captcha-key"
        secretPath: "secret/data/crawler/external-apis"
        secretKey: "antiCaptchaKey"