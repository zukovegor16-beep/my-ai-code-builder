# =============================================================================
# Part 6 — Ansible Inventory and Base Playbook for K3s
# =============================================================================
# File: infra/ansible/inventory.ini

# ----------------------------------------
# Host Groups
# ----------------------------------------
# NOTE: Replace IP addresses with actual outputs from Terraform.
# For now we use placeholder IPs; in CI/CD they will be substituted.

[masters]
k3s-master-1 ansible_host=10.0.1.10 ansible_user=ubuntu
k3s-master-2 ansible_host=10.0.1.11 ansible_user=ubuntu
k3s-master-3 ansible_host=10.0.1.12 ansible_user=ubuntu

[workers]
k3s-worker-1 ansible_host=10.0.1.20 ansible_user=ubuntu
k3s-worker-2 ansible_host=10.0.1.21 ansible_user=ubuntu

[gpu_workers]
k3s-gpu-worker-1 ansible_host=10.0.1.30 ansible_user=ubuntu

# ----------------------------------------
# Group Variables
# ----------------------------------------
[all:vars]
ansible_ssh_private_key_file = ./crawler_ssh_key.pem
ansible_python_interpreter = /usr/bin/python3

# Common settings
k3s_version = v1.29.0+k3s1
cluster_token = "{{ lookup('env', 'K3S_TOKEN') }}"
master_ip = "10.0.1.10"   # first master IP

# For production, use the Vault token or environment variable
vault_addr = "http://vault.crawler-ecosystem.com:8200"
vault_token = "{{ lookup('env', 'VAULT_TOKEN') }}"